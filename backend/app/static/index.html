<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>One-shot WAV Slicer</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>One-shot WAV Slicer</h1>
      <p class="subtitle">
        Upload one WAV file with one-shots separated by silence and download a ZIP with sliced WAV files.
      </p>

      <form id="upload-form" class="card">
        <label class="field">
          <span>WAV file</span>
          <input id="wav-file" type="file" accept=".wav,audio/wav" required />
        </label>
        <label class="field">
          <span>Mode</span>
          <select id="mode-select" name="mode">
            <option value="oneshot" selected>One-shots (silence/transient detect)</option>
            <option value="loop">Loops (fixed BPM/steps)</option>
          </select>
        </label>

        <details>
          <summary>Advanced settings</summary>
          <div class="grid">
            <label class="field">
              <span>Silence threshold (dBFS)</span>
              <input name="silence_threshold_db" type="number" value="-40" step="1" />
            </label>
            <label class="field">
              <span>Min silence (ms)</span>
              <input name="min_silence_ms" type="number" value="80" min="1" />
            </label>
            <label class="field">
              <span>Min clip length (ms)</span>
              <input name="min_clip_ms" type="number" value="25" min="1" />
            </label>
            <label class="field">
              <span>Padding (ms)</span>
              <input name="padding_ms" type="number" value="5" min="0" />
            </label>
            <label class="field">
              <span>Min peak level (dBFS)</span>
              <input name="min_peak_db" type="number" value="-60" step="1" />
            </label>
            <label class="checkbox">
              <input name="normalize" type="checkbox" />
              <span>Normalize each exported clip</span>
            </label>
            <label class="checkbox">
              <input name="dedupe" type="checkbox" />
              <span>Exclude near-duplicate slices (waveform match)</span>
            </label>
            <label class="field">
              <span>Dedupe waveform |r| (0.5–1, lower = stricter / more drops)</span>
              <input name="dedupe_correlation_threshold" type="number" value="0.87" min="0.5" max="1" step="0.005" />
            </label>
            <label class="field">
              <span>Dedupe spectral match (0.5–1, lower = stricter)</span>
              <input name="dedupe_spectral_threshold" type="number" value="0.90" min="0.5" max="1" step="0.005" />
            </label>
            <label class="field">
              <span>Dedupe min waveform for spectral rule (0.5–0.99)</span>
              <input name="dedupe_spectral_min_waveform" type="number" value="0.74" min="0.5" max="0.99" step="0.01" />
            </label>
            <label class="field">
              <span>Dedupe envelope prefilter (0.35–0.95, lower = more candidates checked)</span>
              <input name="dedupe_prefilter_threshold" type="number" value="0.58" min="0.35" max="0.95" step="0.01" />
            </label>
            <label class="field">
              <span>Dedupe max length ratio (≥1, higher = allow more trim mismatch)</span>
              <input name="dedupe_max_length_ratio" type="number" value="1.5" min="1" max="3" step="0.05" />
            </label>
            <label class="field">
              <span>Dedupe compare points (128–32768)</span>
              <input name="dedupe_compare_points" type="number" value="2048" min="128" max="32768" step="256" />
            </label>
            <label class="field">
              <span>Dedupe max time align (ms, 0–200)</span>
              <input name="dedupe_max_lag_ms" type="number" value="10" min="0" max="200" step="1" />
            </label>
            <label class="field">
              <span>Loop BPM</span>
              <input name="bpm" type="number" value="120" min="1" step="0.01" />
            </label>
            <label class="field">
              <span>Loop steps per loop</span>
              <input name="steps_per_loop" type="number" value="32" min="1" />
            </label>
            <label class="field">
              <span>Steps per beat</span>
              <input name="steps_per_beat" type="number" value="4" min="1" />
            </label>
            <label class="checkbox">
              <input name="auto_offset" type="checkbox" checked />
              <span>Auto-detect loop start offset</span>
            </label>
            <label class="field">
              <span>Max offset search (ms)</span>
              <input name="max_offset_ms" type="number" value="500" min="0" max="5000" />
            </label>
            <label class="field">
              <span>Min last loop ratio (0.5–1)</span>
              <input name="min_last_loop_ratio" type="number" value="0.9" min="0.5" max="1" step="0.01" />
            </label>
          </div>
        </details>

        <canvas id="waveform" width="960" height="140"></canvas>
        <div id="status" class="status">Choose a WAV file to begin.</div>

        <button id="process-btn" type="submit">Slice and Build ZIP</button>
      </form>

      <section id="result" class="card hidden">
        <h2>Result</h2>
        <p id="slice-count"></p>
        <p id="dedupe-info" class="small hidden"></p>
        <p id="loop-info" class="small hidden"></p>
        <p id="labels-info" class="small hidden"></p>
        <p id="filenames" class="small"></p>
        <a id="download-link" class="button" download="one_shots.zip">Download ZIP</a>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
